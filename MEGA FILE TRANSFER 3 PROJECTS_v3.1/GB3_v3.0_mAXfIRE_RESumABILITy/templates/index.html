<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Speed + Auto-Resume</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #111; padding: 40px; border-radius: 8px; border: 1px solid #333; width: 100%; max-width: 500px; text-align: center; }
        .btn { background-color: #ff3b3b; color: white; border: none; padding: 15px; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.2s; }
        .btn:hover { background-color: #ff1c1c; }
        .btn:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        input[type=file] { padding: 10px; background: #222; width: 95%; border: 1px solid #444; color: white; margin-bottom: 20px; }
        .progress-bg { background-color: #222; height: 20px; width: 100%; margin-top: 20px; overflow: hidden; }
        .progress-bar { background-color: #ff3b3b; height: 100%; width: 0%; transition: width 0.1s; }
        #speed { color: #ff3b3b; font-weight: bold; margin-top: 15px; font-size: 20px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0;">DIRECT INJECTION (V2.0)</h2>
    <p style="color:#777; font-size:14px; margin-top:-10px;">Now with Auto-Resume</p>
    <input type="file" id="fileInput">
    <button class="btn" id="uploadBtn" onclick="startUpload()">FIRE AT MAXIMUM SPEED</button>

    <div class="progress-bg"><div class="progress-bar" id="progressBar"></div></div>
    <span id="speed">Awaiting File...</span>
</div>

<script>
    const CHUNK_SIZE = 50 * 1024 * 1024; // 50MB
    const MAX_CONCURRENT = 6;            

    async function startUpload() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        document.getElementById('uploadBtn').disabled = true;
        const progressBar = document.getElementById('progressBar');
        const speedText = document.getElementById('speed');

        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        
        // --- NEW: THE RESUME CHECK ---
        speedText.innerText = "Scanning Server for Existing Data...";
        const statusRes = await fetch(`/status?filename=${encodeURIComponent(file.name)}`);
        const statusData = await statusRes.json();
        const uploadedSet = new Set(statusData.uploaded_chunks);
        
        let completedChunks = uploadedSet.size;
        
        // Build a queue of ONLY the missing chunks
        let chunksQueue = [];
        for (let i = 0; i < totalChunks; i++) {
            if (!uploadedSet.has(i)) {
                chunksQueue.push(i);
            }
        }

        if (completedChunks > 0 && completedChunks < totalChunks) {
            speedText.innerText = `Resuming from ${Math.round((completedChunks/totalChunks)*100)}%...`;
            progressBar.style.width = (completedChunks / totalChunks) * 100 + '%';
        }

        let startTime = Date.now();
        let bytesUploadedThisSession = 0;

        async function worker() {
            while (chunksQueue.length > 0) {
                const chunkIndex = chunksQueue.shift(); 
                
                const start = chunkIndex * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const chunk = file.slice(start, end);

                const formData = new FormData();
                formData.append('file', chunk);
                formData.append('filename', file.name);
                formData.append('chunk_index', chunkIndex);
                formData.append('total_size', file.size);
                formData.append('chunk_size', CHUNK_SIZE);

                try {
                    await fetch('/upload', { method: 'POST', body: formData });
                    completedChunks++;
                    bytesUploadedThisSession += (end - start);
                    
                    const percent = (completedChunks / totalChunks) * 100;
                    progressBar.style.width = percent + '%';
                    
                    const timeElapsed = (Date.now() - startTime) / 1000; 
                    const speedMbps = ((bytesUploadedThisSession * 8) / timeElapsed / 1000000).toFixed(2);
                    
                    speedText.innerText = `${percent.toFixed(1)}% | ${speedMbps} Mbps`;
                    
                } catch (e) {
                    console.error("Wi-Fi glitch detected. Retrying chunk...", e);
                    chunksQueue.push(chunkIndex); 
                }
            }
        }

        const workers = [];
        for (let i = 0; i < MAX_CONCURRENT; i++) {
            workers.push(worker());
        }

        await Promise.all(workers);
        speedText.innerText = "TRANSFER COMPLETE. FILE SECURED.";
        speedText.style.color = "#00ff00";
    }
</script>

</body>
</html>
